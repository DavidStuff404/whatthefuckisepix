        function removePlayerFromWorld(id) {
            const p = playersMap.get(id);
            if (p) {
                scene.remove(p.group);
                playersMap.delete(id);
            }
        }

        function updatePlayerChatBubble(p, msg) {
            if(!msg) return;
            
            const canvas = document.createElement('canvas');
            canvas.width = 512; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            ctx.font = 'bold 32px sans-serif';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillStyle = 'white';
            ctx.beginPath(); ctx.roundRect(canvas.width/2 - 220, 20, 440, 80, 20); ctx.fill();
            ctx.beginPath(); ctx.moveTo(canvas.width/2 - 10, 100); ctx.lineTo(canvas.width/2 + 10, 100); ctx.lineTo(canvas.width/2, 120); ctx.fill();
            ctx.fillStyle = 'black';
            ctx.fillText(msg.substring(0, 30) + (msg.length>30?'...':''), canvas.width/2, 60);
            
            p.chatSprite.material.map.dispose();
            p.chatSprite.material.map = new THREE.CanvasTexture(canvas);
            p.chatSprite.visible = true;
            p.nameSprite.visible = false;

            if(p.chatTimeout) clearTimeout(p.chatTimeout);
            p.chatTimeout = setTimeout(() => {
                p.chatSprite.visible = false;
                p.nameSprite.visible = true;
            }, 5000);
        }

        function playAnimation(p, name) {
            if (!p.rig.actions) return;
            const action = p.rig.actions[name];
            if (!action) return;
            if (p.rig.activeAction === action) return;
            
            if (p.rig.activeAction) {
                p.rig.activeAction.fadeOut(0.25);
            }
            action.reset().fadeIn(0.25).play();
            p.rig.activeAction = action;
        }

        // --- Render Loop & Interpolation ---
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1);

            if (!isPlaying) return;

            // Update flying limbs if any
            proceduralScenery.forEach(mesh => {
                if (mesh.userData.velocity) {
                    mesh.position.add(mesh.userData.velocity.clone().multiplyScalar(delta));
                    mesh.rotation.x += mesh.userData.rotationVel.x;
                    mesh.rotation.y += mesh.userData.rotationVel.y;
                    mesh.userData.velocity.y -= 20 * delta; // gravity
                    if (mesh.position.y < 0) {
                        mesh.position.y = 0;
                        mesh.userData.velocity.set(0,0,0);
                    }
                }
            });

            if (isRespawning) return;

            // Get local input direction
            let moveDir = new THREE.Vector3();
            if (joyVector.x !== 0 || joyVector.y !== 0) {
                moveDir.set(joyVector.x, 0, joyVector.y)
                    .applyAxisAngle(new THREE.Vector3(0, 1, 0), camYaw)
                    .normalize();
                
                const localP = playersMap.get(myUserId);
                if (localP && localP.state?.dancing) {
                    localP.state.dancing = false;
                    toggleDanceMusic(false);
                }
            }

            function isPlayerGrounded(p, id) {
                if (id === myUserId) return localPlayerGrounded;
                if (p.group.position.y <= 0.05) return true;
                const pSize = 0.7;
                for (let col of worldColliders) {
                    if (p.group.position.x + pSize > col.box.min.x && p.group.position.x - pSize < col.box.max.x &&
                        p.group.position.z + pSize > col.box.min.z && p.group.position.z - pSize < col.box.max.z) {
                        if (p.group.position.y >= col.box.max.y - 0.15 && p.group.position.y <= col.box.max.y + 0.15) {
                            return true;
                        }
                    }
                }
                return false;
            }

            // Local Physics and Collision updates
            const localP = playersMap.get(myUserId);
            if (localP) {
                // Check if in water or lava
                let inWater = false;
                let inLava = false;
                const pBox = new THREE.Box3().setFromCenterAndSize(
                    localP.group.position,
                    new THREE.Vector3(1.4, 4.5, 1.4)
                );

                for (let water of waterColliders) {
                    if (pBox.intersectsBox(water.box)) {
                        inWater = true;
                        break;
                    }
                }

                for (let lava of lavaColliders) {
                    if (pBox.intersectsBox(lava.box)) {
                        inLava = true;
                        break;
                    }
                }

                // If in lava, trigger death
                if (inLava && !isRespawning) {
                    isRespawning = true;
                    explodeLimbs(localP);
                    playSound('jump'); // Oof sound
                    showMenuToast("Oof! You died.");
                    
                    setTimeout(() => {
                        isRespawning = false;
                        location.reload(); // Quick reset for consistency
                    }, 4000);
                }

                // Roblox-like Physics: Extremely responsive acceleration/deceleration
                const speed = inWater ? 7 : 16;
                const accel = inWater ? 10 : 40; 
                const friction = inWater ? 12 : 40; 

                const targetVelX = moveDir.x * speed;
                const targetVelZ = moveDir.z * speed;

                if (moveDir.lengthSq() > 0) {
                    localPlayerVelocity.x += (targetVelX - localPlayerVelocity.x) * accel * delta;
                    localPlayerVelocity.z += (targetVelZ - localPlayerVelocity.z) * delta * accel;
                } else {
                    localPlayerVelocity.x += (0 - localPlayerVelocity.x) * friction * delta;
                    localPlayerVelocity.z += (0 - localPlayerVelocity.z) * friction * delta;
                }

                if (inWater) {
                    localPlayerVelocity.y += (-1.5 - localPlayerVelocity.y) * 4 * delta; // buoyancy sinking
                    localPlayerGrounded = false;
                } else {
                    if (!localPlayerGrounded) {
                        localPlayerVelocity.y -= 48 * delta; // Roblox-like fast gravity descent (was 32)
                    } else {
                        localPlayerVelocity.y = Math.max(0, localPlayerVelocity.y);
                    }
                }

                let nextPos = localP.group.position.clone().add(localPlayerVelocity.clone().multiplyScalar(delta));
                const pSize = 0.7;
                
                if (!inWater) {
                    localPlayerGrounded = false;
                }

                // Colliders Check
                for (let col of worldColliders) {
                    if (localP.group.position.y < col.box.max.y) {
                        if (nextPos.x + pSize > col.box.min.x && nextPos.x - pSize < col.box.max.x &&
                            localP.group.position.z + pSize > col.box.min.z && localP.group.position.z - pSize < col.box.max.z) {
                            if (localPlayerVelocity.x > 0) nextPos.x = col.box.min.x - pSize - 0.001;
                            else if (localPlayerVelocity.x < 0) nextPos.x = col.box.max.x + pSize + 0.001;
                            localPlayerVelocity.x = 0;
                        }
                    }
                }

                for (let col of worldColliders) {
                    if (localP.group.position.y < col.box.max.y) {
                        if (localP.group.position.x + pSize > col.box.min.x && localP.group.position.x - pSize < col.box.max.x &&
                            nextPos.z + pSize > col.box.min.z && nextPos.z - pSize < col.box.max.z) {
                            if (localPlayerVelocity.z > 0) nextPos.z = col.box.min.z - pSize - 0.001;
                            else if (localPlayerVelocity.z < 0) nextPos.z = col.box.max.z + pSize + 0.001;
                            localPlayerVelocity.z = 0;
                        }
                    }
                }

                if (nextPos.y <= 0) {
                    nextPos.y = 0;
                    localPlayerVelocity.y = 0;
                    localPlayerGrounded = true;
                    jumpCount = 0;
                }

                for (let col of worldColliders) {
                    const minX = col.box.min.x;
                    const maxX = col.box.max.x;
                    const minZ = col.box.min.z;
                    const maxZ = col.box.max.z;
                    const maxY = col.box.max.y;

                    if (nextPos.x + pSize > minX && nextPos.x - pSize < maxX &&
                        nextPos.z + pSize > minZ && nextPos.z - pSize < maxZ) {
                        if (nextPos.y <= maxY && nextPos.y >= maxY - 0.7 && localPlayerVelocity.y <= 0) {
                            nextPos.y = maxY;
                            localPlayerVelocity.y = 0;
                            localPlayerGrounded = true;
                            jumpCount = 0;
                        }
                    }
                }

                localP.group.position.copy(nextPos);
                localP.targetPos.copy(nextPos);

                // Wrap-around logic for Backrooms endless maze
                if (window.appState.selectedMap === 'backrooms') {
                    const limit = 42;
                    if (localP.group.position.x > limit) {
                        localP.group.position.x = -limit + 1;
                        localP.targetPos.x = -limit + 1;
                    } else if (localP.group.position.x < -limit) {
                        localP.group.position.x = limit - 1;
                        localP.targetPos.x = limit - 1;
                    }
                    if (localP.group.position.z > limit) {
                        localP.group.position.z = -limit + 1;
                        localP.targetPos.z = -limit + 1;
                    } else if (localP.group.position.z < -limit) {
                        localP.group.position.z = limit - 1;
                        localP.targetPos.z = limit - 1;
                    }
                }

                if (moveDir.lengthSq() > 0) {
                    localP.targetRot = Math.atan2(moveDir.x, moveDir.z);
                }
            }

            sendStateToNetwork();

            // Interpolate and Animate all players
            for (const [id, p] of playersMap.entries()) {
                const isLocal = (id === myUserId);
                
                if (!isLocal) {
                    p.group.position.lerp(p.targetPos, delta * 12);
                }

                let diff = p.targetRot - p.group.rotation.y;
                while (diff < -Math.PI) diff += Math.PI * 2;
                while (diff > Math.PI) diff -= Math.PI * 2;
                p.group.rotation.y += diff * delta * 15;

                const groundedState = isPlayerGrounded(p, id);
                const isDancing = !!p.state?.dancing;
                const isMoving = p.state?.moving || (isLocal && (joyVector.x !== 0 || joyVector.y !== 0));

                // Procedural Animation Logic
                if (isDancing) {
                    p.rig.danceTime += delta * 5.0;
                    const style = p.rig.danceStyle || 0;

                    if (style === 0) {
                        // Classic spin & arm wave (Original style)
                        p.group.rotation.y += delta * 6.0;
                        p.rig.armL.rotation.x = -Math.PI * 0.8 + Math.sin(p.rig.danceTime) * 0.6;
                        p.rig.armR.rotation.x = -Math.PI * 0.8 + Math.cos(p.rig.danceTime) * 0.6;
                        p.rig.legL.rotation.x = Math.sin(p.rig.danceTime) * 0.4;
                        p.rig.legR.rotation.x = -Math.sin(p.rig.danceTime) * 0.4;
                        p.rig.head.position.y = 4.0 + Math.sin(p.rig.danceTime * 2.0) * 0.15;
                        p.rig.torso.position.y = 3.0 + Math.sin(p.rig.danceTime * 2.0) * 0.1;
                    } else if (style === 1) {
                        // New Animation 1: side-to-side slide / sway shuffle
                        p.group.position.x += Math.sin(p.rig.danceTime) * 0.05;
                        p.rig.armL.rotation.z = -Math.PI * 0.4 + Math.sin(p.rig.danceTime) * 0.3;
                        p.rig.armR.rotation.z = Math.PI * 0.4 - Math.sin(p.rig.danceTime) * 0.3;
                        p.rig.legL.rotation.z = Math.sin(p.rig.danceTime) * 0.2;
                        p.rig.legR.rotation.z = -Math.sin(p.rig.danceTime) * 0.2;
                    } else if (style === 2) {
                        // New Animation 2: vertical hop wave / jump dance
                        p.rig.head.position.y = 4.0 + Math.abs(Math.sin(p.rig.danceTime)) * 0.5;
                        p.rig.torso.position.y = 3.0 + Math.abs(Math.sin(p.rig.danceTime)) * 0.3;
                        p.rig.armL.rotation.x = -Math.PI + Math.sin(p.rig.danceTime) * 0.5;
                        p.rig.armR.rotation.x = -Math.PI + Math.sin(p.rig.danceTime) * 0.5;
                    } else if (style === 3) {
                        // New Animation 3: helicopter arm spin
                        p.rig.armL.rotation.z = p.rig.danceTime * 2.5;
                        p.rig.armR.rotation.z = -p.rig.danceTime * 2.5;
                        p.group.rotation.y += delta * 12.0;
                    } else if (style === 4) {
                        // New Animation 4: fast wobble & head shake
                        p.rig.armL.rotation.x = Math.sin(p.rig.danceTime * 3) * 1.5;
                        p.rig.armR.rotation.y = Math.cos(p.rig.danceTime * 3) * 1.5;
                        p.rig.legL.rotation.x = Math.cos(p.rig.danceTime * 3) * 0.8;
                        p.rig.legR.rotation.x = Math.sin(p.rig.danceTime * 3) * 0.8;
                        p.rig.head.rotation.z = Math.sin(p.rig.danceTime * 4) * 0.3;
                    } else if (style === 5) {
                        // New Animation 5: full body flip and hop rotation
                        p.group.rotation.x = p.rig.danceTime * 2.0;
                        p.rig.head.position.y = 4.0 + Math.abs(Math.sin(p.rig.danceTime)) * 0.6;
                        p.rig.torso.position.y = 3.0 + Math.abs(Math.sin(p.rig.danceTime)) * 0.4;
                    } else if (style === 6) {
                        // New Animation 6: rhythmic conga hop
                        p.rig.armL.rotation.x = -Math.PI * 0.55;
                        p.rig.armR.rotation.x = -Math.PI * 0.55;
                        p.rig.torso.rotation.x = Math.sin(p.rig.danceTime) * 0.25;
                        p.rig.head.rotation.x = -Math.sin(p.rig.danceTime) * 0.25;
                        p.group.position.z += Math.sin(p.rig.danceTime) * 0.06;
                    } else if (style === 7) {
                        // New Animation 7: robotic step-lock rotation
                        const rTicks = Math.floor(p.rig.danceTime * 2.5);
                        p.rig.armL.rotation.x = (rTicks % 2 === 0) ? -Math.PI * 0.25 : -Math.PI * 0.75;
                        p.rig.armR.rotation.z = (rTicks % 3 === 0) ? Math.PI * 0.45 : 0;
                        p.rig.head.rotation.y = Math.sin(rTicks) * 0.4;
                    } else if (style === 8) {
                        // Style 8: Aggressive headbang
                        p.rig.head.rotation.x = Math.sin(p.rig.danceTime * 4.0) * 0.6;
                        p.rig.armL.rotation.x = -Math.PI * 0.8 + Math.sin(p.rig.danceTime) * 0.2;
                        p.rig.armR.rotation.x = -Math.PI * 0.8 + Math.cos(p.rig.danceTime) * 0.2;
                        p.rig.torso.rotation.x = Math.sin(p.rig.danceTime * 4.0) * 0.15;
                    } else if (style === 9) {
                        // Style 9: T-pose hover
                        p.rig.armL.rotation.z = -Math.PI * 0.5;
                        p.rig.armR.rotation.z = Math.PI * 0.5;
                        p.rig.armL.rotation.x = 0;
                        p.rig.armR.rotation.x = 0;
                        p.group.rotation.y += delta * 4.0;
                        p.group.position.y += Math.sin(p.rig.danceTime) * 0.05;
                    } else if (style === 10) {
                        // Style 10: Breakdance spin
                        p.rig.torso.rotation.z = Math.PI;
                        p.rig.head.position.y = 2.0;
                        p.group.rotation.y += delta * 15.0;
                        p.rig.legL.rotation.x = Math.sin(p.rig.danceTime * 2) * 1.2;
                        p.rig.legR.rotation.x = Math.cos(p.rig.danceTime * 2) * 1.2;
                    } else if (style === 11) {
                        // Style 11: Horse riding style
                        p.rig.armL.rotation.x = -Math.PI * 0.4;
                        p.rig.armR.rotation.x = -Math.PI * 0.4;
                        p.rig.armL.rotation.y = 0.3;
                        p.rig.armR.rotation.y = -0.3;
                        p.rig.torso.position.y = 3.0 + Math.abs(Math.sin(p.rig.danceTime * 3)) * 0.4;
                        p.rig.head.position.y = 4.0 + Math.abs(Math.sin(p.rig.danceTime * 3)) * 0.4;
                        p.rig.legL.rotation.x = -0.4;
                        p.rig.legR.rotation.x = -0.4;
                    } else if (style === 12) {
                        // Style 12: Macarena arm-cross
                        const tick = Math.floor(p.rig.danceTime * 3);
                        p.rig.armL.rotation.z = (tick % 4 === 0) ? -Math.PI * 0.4 : -Math.PI * 0.1;
                        p.rig.armR.rotation.z = (tick % 4 === 1) ? Math.PI * 0.4 : Math.PI * 0.1;
                        p.rig.head.rotation.y = Math.sin(p.rig.danceTime) * 0.2;
                    } else if (style === 13) {
                        // Style 13: Matrix lean back
                        p.rig.torso.rotation.x = -0.6;
                        p.rig.head.rotation.x = 0.5;
                        p.rig.armL.rotation.x = -Math.PI * 0.5;
                        p.rig.armR.rotation.x = -Math.PI * 0.5;
                        p.rig.legL.rotation.x = 0.3;
                        p.rig.legR.rotation.x = 0.3;
                    } else if (style === 14) {
                        // Style 14: 360 Spin Jump
                        p.group.rotation.y += delta * 15.0;
                        p.rig.torso.position.y = 3.0 + Math.abs(Math.sin(p.rig.danceTime)) * 2.0;
                        p.rig.head.position.y = 4.0 + Math.abs(Math.sin(p.rig.danceTime)) * 2.0;
                        p.rig.armL.rotation.z = -Math.PI * 0.8;
                        p.rig.armR.rotation.z = Math.PI * 0.8;
                    } else if (style === 15) {
                        // Style 15: Crouch Slide
                        p.rig.torso.position.y = 2.0;
                        p.rig.head.position.y = 3.0;
                        p.rig.legL.rotation.x = -Math.PI * 0.4;
                        p.rig.legR.rotation.x = -Math.PI * 0.4;
                        p.rig.armL.rotation.x = Math.sin(p.rig.danceTime * 2) * 0.5;
                        p.rig.armR.rotation.x = -Math.sin(p.rig.danceTime * 2) * 0.5;
                    } else if (style === 16) {
                        // Style 16: The Floss
                        p.rig.armL.rotation.z = Math.sin(p.rig.danceTime * 4.0) * 0.8 - 0.4;
                        p.rig.armR.rotation.z = Math.sin(p.rig.danceTime * 4.0) * 0.8 + 0.4;
                        p.rig.torso.rotation.y = -Math.sin(p.rig.danceTime * 4.0) * 0.5;
                    } else if (style === 17) {
                        // Style 17: YMCA Arm movements
                        const beat = Math.floor(p.rig.danceTime) % 4;
                        if (beat === 0) { // Y
                            p.rig.armL.rotation.z = -Math.PI * 0.75;
                            p.rig.armR.rotation.z = Math.PI * 0.75;
                        } else if (beat === 1) { // M
                            p.rig.armL.rotation.z = -Math.PI * 0.25;
                            p.rig.armR.rotation.z = Math.PI * 0.25;
                        } else if (beat === 2) { // C
                            p.rig.armL.rotation.z = -Math.PI * 0.5;
                            p.rig.armR.rotation.z = -Math.PI * 0.5;
                        } else { // A
                            p.rig.armL.rotation.z = -Math.PI * 0.1;
                            p.rig.armR.rotation.z = Math.PI * 0.1;
                        }
                    } else if (style === 18) {
                        // Style 18: Headspin / Cartwheel style
                        p.rig.torso.rotation.z = p.rig.danceTime * 3.0;
                        p.rig.head.position.y = 2.5 + Math.abs(Math.sin(p.rig.danceTime * 2.0)) * 0.5;
                    } else if (style === 19) {
                        // Style 19: Conga walk side-to-side
                        p.rig.armL.rotation.x = -Math.PI * 0.5;
                        p.rig.armR.rotation.x = -Math.PI * 0.5;
                        p.group.position.x += Math.sin(p.rig.danceTime) * 0.05;
                        p.group.position.z += Math.cos(p.rig.danceTime) * 0.05;
                    }
                } else {
                    if (!groundedState) {
                        p.rig.armL.rotation.x = -Math.PI * 0.8;
                        p.rig.armR.rotation.x = -Math.PI * 0.8;
                        p.rig.armR.rotation.z = -0.1;
                        p.rig.armR.rotation.y = 0;
                        p.rig.legL.rotation.x = -0.2;
                        p.rig.legR.rotation.x = 0.2;
                        p.rig.armL.rotation.z = 0.1;
                        p.rig.legL.rotation.z = 0;
                        p.rig.legR.rotation.z = 0;
                        p.rig.head.position.y = 4.0;
                        p.rig.torso.position.y = 3.0;
                    } else {
                        if (isMoving) {
                            p.rig.time += delta * 14;
                            const sin = Math.sin(p.rig.time);
                            p.rig.armL.rotation.x = sin * 0.8;
                            p.rig.armL.rotation.z = 0;
                            p.rig.armR.rotation.x = -sin * 0.8;
                            p.rig.armR.rotation.z = 0;
                            p.rig.armR.rotation.y = 0;

                            p.rig.legL.rotation.x = -sin * 0.8;
                            p.rig.legR.rotation.x = sin * 0.8;
                            p.rig.legL.rotation.z = 0;
                            p.rig.legR.rotation.z = 0;
                            p.rig.head.position.y = 4.0;
                            p.rig.torso.position.y = 3.0;
                        } else {
                            p.rig.time = 0;
                            p.rig.armL.rotation.x *= 0.8;
                            p.rig.legL.rotation.x *= 0.8;
                            p.rig.legR.rotation.x *= 0.8;
                            p.rig.armR.rotation.x *= 0.8;
                            p.rig.armR.rotation.z *= 0.8;
                            p.rig.armR.rotation.y = 0;
                            
                            p.rig.head.position.y = 4.0;
                            p.rig.torso.position.y = 3.0;
                        }
                    }
                }

                p.nameSprite.quaternion.copy(camera.quaternion);
                p.chatSprite.quaternion.copy(camera.quaternion);
            }

            // Camera Follow Local Player
            if (localP) {
                const targetLookAt = localP.group.position.clone().add(new THREE.Vector3(0, 2.5, 0));
                
                const offsetX = camDistance * Math.cos(camPitch) * Math.sin(camYaw);
                const offsetY = camDistance * Math.sin(camPitch);
                const offsetZ = camDistance * Math.cos(camPitch) * Math.cos(camYaw);

                const desiredCamPos = targetLookAt.clone().add(new THREE.Vector3(offsetX, offsetY, offsetZ));
                
                // Raycast check for camera collision to prevent clipping through world objects
                let finalCamPos = desiredCamPos.clone();
                const rayDirection = new THREE.Vector3().subVectors(desiredCamPos, targetLookAt).normalize();
                const raycaster = new THREE.Raycaster(targetLookAt, rayDirection, 0.1, camDistance);
                
                // Gather all valid collider meshes
                const colliderMeshes = worldColliders.map(c => c.mesh).filter(Boolean);
                const intersects = raycaster.intersectObjects(colliderMeshes, true);
                
                if (intersects.length > 0) {
                    // Collided! Move camera to the first intersection point, slightly offset towards player
                    const hit = intersects[0];
                    finalCamPos.copy(hit.point).addScaledVector(rayDirection, -0.4);
                }
                
                camera.position.lerp(finalCamPos, delta * 15);
                camera.lookAt(targetLookAt);
            }

            renderer.render(scene, camera);
        }

        // --- Touch Input Handling ---
        function setupTouchControls() {
            const joyZone = document.getElementById('joystick-zone');
            const joyBase = document.getElementById('joystick-base');
            const joyStick = document.getElementById('joystick-stick');
            const camZone = document.getElementById('camera-zone');
            const jumpBtn = document.getElementById('jump-btn');

            let joyId = null;
            let joyOrigin = { x: 0, y: 0 };
            const joyRadius = 60;

            joyZone.addEventListener('pointerdown', (e) => {
                if (joyId !== null) return;
                joyId = e.pointerId;
                joyZone.setPointerCapture(joyId);
                
                joyOrigin = { x: e.clientX, y: e.clientY };
                joyBase.style.left = e.clientX + 'px';
                joyBase.style.top = e.clientY + 'px';
                joyBase.style.display = 'block';
                joyStick.style.transform = `translate(-50%, -50%)`;
                
                joyVector = { x: 0, y: 0 };
            });

            joyZone.addEventListener('pointermove', (e) => {
                if (e.pointerId !== joyId) return;
                
                let dx = e.clientX - joyOrigin.x;
                let dy = e.clientY - joyOrigin.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                
                if (dist > joyRadius) {
                    dx = (dx / dist) * joyRadius;
                    dy = (dy / dist) * joyRadius;
                }
                
                joyStick.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                
                joyVector.x = dx / joyRadius;
                joyVector.y = dy / joyRadius;
            });

            const endJoystick = (e) => {
                if (e.pointerId !== joyId) return;
                joyZone.releasePointerCapture(joyId);
                joyId = null;
                joyBase.style.display = 'none';
                joyVector = { x: 0, y: 0 };
            };
            joyZone.addEventListener('pointerup', endJoystick);
            joyZone.addEventListener('pointercancel', endJoystick);

            let camId = null;
            let lastCamPos = { x: 0, y: 0 };

            camZone.addEventListener('pointerdown', (e) => {
                if (camId !== null) return;
                camId = e.pointerId;
                camZone.setPointerCapture(camId);
                lastCamPos = { x: e.clientX, y: e.clientY };
            });

            camZone.addEventListener('pointermove', (e) => {
                if (e.pointerId !== camId) return;
                
                const dx = e.clientX - lastCamPos.x;
                const dy = e.clientY - lastCamPos.y;
                lastCamPos = { x: e.clientX, y: e.clientY };

                // Higher sensitivity
                camYaw -= dx * 0.025;
                camPitch += dy * 0.025; 
                camPitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, camPitch));
                lastCameraInteractionTime = Date.now();
            });

            const endCam = (e) => {
                if (e.pointerId !== camId) return;
                camZone.releasePointerCapture(camId);
                camId = null;
            };
            camZone.addEventListener('pointerup', endCam);
            camZone.addEventListener('pointercancel', endCam);

            const danceBtn = document.getElementById('dance-btn');
            danceBtn.addEventListener('pointerdown', (e) => {
                e.target.setPointerCapture(e.pointerId);
                const localP = playersMap.get(myUserId);
                if (localP) {
                    const nextDanceState = !localP.state?.dancing;
                    localP.state.dancing = nextDanceState;
                    if (nextDanceState) {
                        // Support 20 different dance animation styles (0 to 19)
                        localP.rig.danceStyle = Math.floor(Math.random() * 20);
                    }
                    toggleDanceMusic(nextDanceState);
                }
            });

            jumpBtn.addEventListener('pointerdown', (e) => {
                e.target.setPointerCapture(e.pointerId);
                
                const localP = playersMap.get(myUserId);
                let inWater = false;
                if (localP) {
                    const pBox = new THREE.Box3().setFromCenterAndSize(
                        localP.group.position,
                        new THREE.Vector3(1.4, 4.5, 1.4)
                    );
                    for (let water of waterColliders) {
                        if (pBox.intersectsBox(water.box)) {
                            inWater = true;
                            break;
                        }
                    }
                }

                if (localPlayerGrounded || inWater || jumpCount < 2) {
                    localPlayerVelocity.y = inWater ? 8 : 18; // Snappy Roblox jump velocity (was 14)
                    localPlayerGrounded = false;
                    jumpCount++;
                    playSound('jump');
                    
                    if (localP && localP.state?.dancing) {
                        localP.state.dancing = false;
                        toggleDanceMusic(false);
                    }
                }
            });
        }

        // --- Chat UI Handling ---
        function setupChatUI() {
            const toggle = document.getElementById('btn-chat-toggle');
            const modal = document.getElementById('chat-modal');
            const form = document.getElementById('chat-form');
            const input = document.getElementById('chat-input');

            // Switch to pointerdown for better responsiveness on touch devices
            toggle.addEventListener('pointerdown', (e) => {
                e.preventDefault();
                if(modal.classList.contains('hidden')) {
                    modal.classList.remove('hidden');
                    // We don't call .focus() programmatically per mobile constraints
                } else {
                    modal.classList.add('hidden');
                }
            });

            form.addEventListener('submit', (e) => {
                e.preventDefault();
                const text = input.value.trim();
                if(text) {
                    const p = playersMap.get(myUserId);
                    if(p) {
                        p.lastMsg = text;
                        updatePlayerChatBubble(p, text);
                        
                        // Jason transformation trigger
                        if (text.toLowerCase() === 'jason') {
                            isJason = true;
                            showMenuToast("Transformation complete: JASON");
                            // Scale up character slightly for menace
                            p.group.scale.set(1.2, 1.2, 1.2);
                        }
                    }
                    input.value = '';
                    modal.classList.add('hidden');
                    playSound('chat');
                    
                    sendStateToNetwork();
                }
            });
        }

        function onWindowResize() {
            if(!camera || !renderer) return;
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

    </script>
